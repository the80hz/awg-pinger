name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Run tests
        run: uv run pytest

      - name: Compile Python files
        run: uv run python -m compileall api_side awg_client_side shared tests

  docker:
    name: Docker images
    runs-on: ubuntu-latest
    needs:
      - test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Compose config
        run: docker compose config

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build api-side image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api-side
          push: ${{ github.event_name == 'push' }}
          tags: |
            the80hz/awg-pinger:api-side
            the80hz/awg-pinger:api-side-${{ github.sha }}

      - name: Build awg-client-side image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: awg-client-side
          push: ${{ github.event_name == 'push' }}
          tags: |
            the80hz/awg-pinger:awg-client-side
            the80hz/awg-pinger:awg-client-side-${{ github.sha }}
